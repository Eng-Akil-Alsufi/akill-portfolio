    <!--
      Runs synchronously BEFORE React mounts.
      1. Applies dark/light theme class to prevent FOUC on Chrome mobile.
      2. Restores language direction so Arabic pages don't flash LTR on reload.
    -->
    <script>
      (function () {
        try {
          /* Theme */
          var theme = localStorage.getItem('theme');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
          /* Language direction — default is en/ltr (already in HTML tag) */
          var lang = localStorage.getItem('i18nextLng');
          if (lang && lang.startsWith('ar')) {
            document.documentElement.dir  = 'rtl';
            document.documentElement.lang = 'ar';
          }
        } catch (e) {}
      })();
    </script>
