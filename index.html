    <!--
      Theme init: runs synchronously BEFORE React mounts.
      Prevents dark-mode FOUC on Chrome mobile and all browsers.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          if (stored === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
